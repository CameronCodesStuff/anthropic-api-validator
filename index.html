<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Handshake Matrix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <h1>Matrix Validator</h1>
        <p class="subtitle">Multi-Engine AI Handshake Utility</p>
        
        <div class="input-group">
            <label for="providerSelect">Target Provider</label>
            <select id="providerSelect" onchange="updatePlaceholder()">
                <option value="anthropic">Anthropic Claude</option>
                <option value="openai">OpenAI GPT</option>
                <option value="gemini">Google Gemini</option>
            </select>
        </div>

        <div class="input-group">
            <label for="apiKey">Secret Access Key</label>
            <input type="password" id="apiKey" placeholder="sk-ant-...">
        </div>

        <button id="checkBtn" onclick="validateKey()">Authenticate Matrix</button>

        <div id="status" class="status-display"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
