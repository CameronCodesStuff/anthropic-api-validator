<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Validator</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #121216;
            --border-color: #24242e;
            --text-primary: #e2e2e9;
            --text-secondary: #71718a;
            --accent-cyan: #00f3ff;
            --accent-red: #ff0055;
            --accent-green: #00ff66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 18, 22, 0.2) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(18, 18, 22, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 8px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            z-index: 2;
            position: relative;
        }

        .container::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-cyan), transparent, var(--accent-red));
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        p.subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #060608;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.25);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        button:disabled {
            border-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
            background: transparent;
            box-shadow: none;
        }

        .status-display {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid transparent;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-display.success {
            display: block;
            background: rgba(0, 255, 102, 0.04);
            border-color: rgba(0, 255, 102, 0.2);
            color: var(--accent-green);
        }

        .status-display.error {
            display: block;
            background: rgba(255, 0, 85, 0.04);
            border-color: rgba(255, 0, 85, 0.2);
            color: var(--accent-red);
        }

        .status-display.loading {
            display: block;
            background: rgba(0, 243, 255, 0.04);
            border-color: rgba(0, 243, 255, 0.2);
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Key Validator</h1>
        <p class="subtitle">Anthropic API Handshake Utility</p>
        
        <div class="input-group">
            <label for="apiKey">Anthropic API Key</label>
            <input type="password" id="apiKey" placeholder="sk-ant-...">
        </div>

        <button id="checkBtn" onclick="validateKey()">Authenticate</button>

        <div id="status" class="status-display"></div>
    </div>

    <script>
        async function validateKey() {
            const keyInput = document.getElementById('apiKey').value.trim();
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('checkBtn');

            if (!keyInput) {
                statusDiv.className = "status-display error";
                statusDiv.innerText = "Error: Key field cannot be empty.";
                return;
            }

            btn.disabled = true;
            statusDiv.className = "status-display loading";
            statusDiv.innerText = "Establishing handshake with Anthropic...";

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': keyInput,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        'dangerouslyAllowBrowser': 'true' 
                    },
                    body: JSON.stringify({
                        model: 'claude-3-haiku-20240307',
                        max_tokens: 1,
                        messages: [{ role: 'user', content: 'Ping' }]
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusDiv.className = "status-display success";
                    statusDiv.innerHTML = "<strong>SUCCESS:</strong> Key is active and working.";
                } else {
                    statusDiv.className = "status-display error";
                    statusDiv.innerHTML = `<strong>FAILED:</strong> ${data.error?.message || 'Authentication rejected.'}`;
                }

            } catch (error) {
                statusDiv.className = "status-display error";
                statusDiv.innerHTML = `<strong>CORS / NETWORK ERROR:</strong> Browser blocked the request or internet is down. Ensure CORS handling is configured or test via a local proxy.`;
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
